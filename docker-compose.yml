services:
  lg-tv-control-hub:
    build: .
    image: localhost/lg-tv-control-hub:latest
    container_name: lg-tv-control-hub
    network_mode: host
    environment:
      PORT: 8686
      DATA_DIR: /app/data
      DISCOVERY_TIMEOUT_MS: 3500
    volumes:
      - ./data:/app/data
    restart: unless-stopped
